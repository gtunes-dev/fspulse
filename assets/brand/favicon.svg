<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- fsPulse Favicon — optimized for 16-32px rendering -->
  <!-- Thicker strokes and simplified pulse for tiny sizes -->
  <!-- Adapts to light/dark mode via CSS media query -->
  <style>
    circle, polyline { stroke: #14B8A6; }
    circle.fill { fill: #14B8A6; opacity: 0.10; }
    @media (prefers-color-scheme: dark) {
      circle, polyline { stroke: #2DD4BF; }
      circle.fill { fill: #2DD4BF; opacity: 0.12; }
    }
  </style>
  <circle class="fill" cx="12" cy="12" r="10.5" stroke="none"/>
  <circle cx="12" cy="12" r="10.5" fill="none" stroke-width="1.5"/>
  <polyline
    points="3,13 7.5,13 9.5,9 12,17 14.5,6 16.5,13 20.5,13"
    fill="none"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
